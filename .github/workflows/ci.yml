name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install websockets asyncpg rich prometheus-client python-dotenv aiohttp ruff

      - name: Lint with ruff
        run: ruff check src/

      - name: Docker build
        run: docker build -t txmonitor:latest .
